<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Real Estate - Core</title>
    <link rel="icon" type="image/png" href="house.png"/>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body>
    <div class="main-container" id="reportWrapper">
        
        <div class="header-nav">
            <div class="brand">AI_VALUATION_CORE</div>
            <div class="status">
                <div>LATITUDE: 12.9716° N</div>
                <div>STATUS: ONLINE</div>
            </div>
        </div>

        <!-- Voice Assistant Hero Section -->
        <div class="voice-hero">
            <h1>NEURAL VOICE ASSISTANT</h1>
            <div class="subtitle">[ ACTIVATE MICROPHONE TO INPUT PARAMETERS ]</div>
            
            <div class="mic-btn-wrapper">
                <button class="mic-btn" id="btnVoice" onclick="toggleVoice()">
                    <i class="fas fa-microphone"></i>
                </button>
            </div>
            
            <div class="voice-status" id="voiceStatus">AWAITING AUDIO INPUT...</div>
        </div>

        <div class="dashboard">
            <!-- Left Column: Inputs -->
            <div class="glass-panel">
                <div class="section-title"><i class="fas fa-sliders-h"></i> Configuration</div>
                
                <div class="field-group">
                    <label>Location</label>
                    <select id="uiLocations" onchange="updateLocationOnMap()">
                        <option value="" disabled selected>Loading...</option>
                    </select>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="field-group">
                        <label>Area (SqFt)</label>
                        <input type="number" id="uiSqft" value="1200" min="300">
                    </div>
                    <div class="field-group">
                        <label>Furnishing</label>
                        <select id="uiFurnishing" onchange="updatePropertyImage()">
                            <option value="0">Unfurnished</option>
                            <option value="1">Semi-Furnished</option>
                            <option value="2">Fully Furnished</option>
                        </select>
                    </div>
                </div>

                <div class="field-group">
                    <label>BHK</label>
                    <div class="radio-group" id="bhk-group" onchange="updatePropertyImage()">
                        <input type="radio" id="bhk-1" name="uiBHK" value="1"><label class="radio-btn" for="bhk-1">1</label>
                        <input type="radio" id="bhk-2" name="uiBHK" value="2" checked><label class="radio-btn" for="bhk-2">2</label>
                        <input type="radio" id="bhk-3" name="uiBHK" value="3"><label class="radio-btn" for="bhk-3">3</label>
                        <input type="radio" id="bhk-4" name="uiBHK" value="4"><label class="radio-btn" for="bhk-4">4+</label>
                    </div>
                </div>

                <div class="field-group">
                    <label>Bathrooms</label>
                    <div class="radio-group" id="bath-group">
                        <input type="radio" id="bath-1" name="uiBathrooms" value="1"><label class="radio-btn" for="bath-1">1</label>
                        <input type="radio" id="bath-2" name="uiBathrooms" value="2" checked><label class="radio-btn" for="bath-2">2</label>
                        <input type="radio" id="bath-3" name="uiBathrooms" value="3"><label class="radio-btn" for="bath-3">3</label>
                    </div>
                </div>

                <div class="section-title" style="margin-top: 10px;"><i class="fas fa-star"></i> Amenities</div>
                <div class="amenities-grid">
                    <label class="checkbox-item"><input type="checkbox" value="amenity_swimming_pool" class="uiAmenity" id="cb_swimming_pool"><span class="checkmark"></span> <span>Pool</span></label>
                    <label class="checkbox-item"><input type="checkbox" value="amenity_gym" class="uiAmenity" id="cb_gym"><span class="checkmark"></span> <span>Gym</span></label>
                    <label class="checkbox-item"><input type="checkbox" value="amenity_parking" class="uiAmenity" id="cb_parking" checked><span class="checkmark"></span> <span>Parking</span></label>
                    <label class="checkbox-item"><input type="checkbox" value="amenity_security" class="uiAmenity" id="cb_security" checked><span class="checkmark"></span> <span>Security</span></label>
                    <label class="checkbox-item"><input type="checkbox" value="amenity_garden" class="uiAmenity" id="cb_garden"><span class="checkmark"></span> <span>Garden</span></label>
                    <label class="checkbox-item"><input type="checkbox" value="amenity_club_house" class="uiAmenity" id="cb_club_house"><span class="checkmark"></span> <span>Club</span></label>
                </div>
            </div>

            <!-- Middle Column: Map & Results -->
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <div class="glass-panel" style="padding: 15px; gap: 15px;">
                    <div id="map"></div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div class="field-group" style="margin-bottom:0;"><label>School (km)</label><input type="number" id="dist_school_km" value="1.5" step="0.1"></div>
                        <div class="field-group" style="margin-bottom:0;"><label>Hospital (km)</label><input type="number" id="dist_hospital_km" value="2.5" step="0.1"></div>
                        <div class="field-group" style="margin-bottom:0;"><label>Metro (km)</label><input type="number" id="dist_bus_stop_km" value="0.8" step="0.1"></div>
                        <div class="field-group" style="margin-bottom:0;"><label>Airport (km)</label><input type="number" id="dist_airport_km" value="35.0" step="0.1"></div>
                    </div>
                    <button class="btn-predict" onclick="onClickedEstimatePrice()">
                        INITIALIZE VALUATION
                    </button>
                </div>

                <div class="result-box" id="resultContainer">
                    <div style="color: var(--silver); font-family: 'Syncopate', sans-serif; font-size: 0.8rem;">ESTIMATED PROPERTY VALUE</div>
                    <div class="price-val" id="uiEstimatedPrice">--</div>
                    <div style="color: #888; margin-bottom: 15px; font-family: monospace;">Lakh Indian Rupees (₹)</div>
                    
                    <div class="insights-grid">
                        <div class="insight-card">
                            <div class="insight-label">Est. Monthly Rent</div>
                            <div class="insight-value" id="uiRent">--</div>
                        </div>
                        <div class="insight-card">
                            <div class="insight-label">Rental Yield</div>
                            <div class="insight-value" id="uiYield">--</div>
                        </div>
                    </div>
                    <div class="rating-badge" id="uiRating">--</div>
                    <div style="margin-top: 10px; font-family: monospace; font-size: 0.75rem; color: #666;" id="uiModelInfo"></div>
                </div>
            </div>

            <!-- Right Column: Location Intel & Charts -->
            <div class="glass-panel">
                <div class="section-title"><i class="fas fa-chart-line"></i> Market Trends</div>
                <div class="chart-container">
                    <canvas id="trendChart"></canvas>
                </div>

                <div class="section-title" style="margin-top: 15px;"><i class="fas fa-images"></i> Topographical View</div>
                <div class="property-img-container">
                    <img id="propertyPreviewImg" src="https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Sample House">
                </div>

                <button class="btn-export" onclick="exportPDF()" id="exportBtn" style="display: none;">
                    [ DOWNLOAD PDF ARCHIVE ]
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
